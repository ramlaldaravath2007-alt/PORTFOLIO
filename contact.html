<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Contact</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Modern Form Layout Styling */
        .contact-wrapper {
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.3);
        }

        .contact-wrapper p {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-glow);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        /* Interactive Inputs with Glassmorphic feel */
        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            border-color: var(--accent-glow);
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .submit-btn-wrapper {
            text-align: center;
            margin-top: 2rem;
        }

        .submit-btn {
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <div class="logo">CSE<span>.AI</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">Education</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h2 class="page-title">Get In <span>Touch</span></h2>

        <div class="contact-wrapper">
            <p>If you would like to collaborate on an automation system, discuss AI/ML engineering, or connect regarding opportunities, feel free to send a message below.</p>
            
            <form action="#" method="POST">
                
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="example@domain.com" required>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="Project Collaboration / Opportunity" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Type your message here..." required></textarea>
                </div>

                <div class="submit-btn-wrapper">
                    <button type="submit" class="btn submit-btn">Send Message</button>
                </div>

            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 | Built professionally from scratch</p>
    </footer>

</body>
</html>
